
# Gyroscopic Harmonizer Configuration
# =====================================
# Four-axis ethical stabilization system configuration

gyroscopic_harmonizer:
  version: "1.0.0"
  name: "Gyroscopic Ethical Harmonizer"
  description: "Four-philosopher axis system for ethical decision stabilization"

  # System parameters
  parameters:
    confidence_cap: 0.75          # Max confidence under peer tension
    stability_threshold: 0.5       # Minimum stability for autonomous decisions
    precession_alert: 45.0        # Degrees - alert if precession exceeds this
    history_limit: 1000           # Max history entries

  # Axis weights (can be adjusted for domain-specific tuning)
  axis_weights:
    kant: 1.0
    hume: 1.0
    spinoza: 1.0
    locke: 1.0

  # Domain-specific overrides
  domains:
    medical:
      axis_weights:
        kant: 1.2    # Duty stronger in medical contexts
        hume: 1.1    # Empathy important
        locke: 1.0
        spinoza: 0.9
    legal:
      axis_weights:
        kant: 1.1
        locke: 1.3   # Rights/consent critical in legal
        spinoza: 1.0
        hume: 0.8
    business:
      axis_weights:
        locke: 1.2   # Property rights
        spinoza: 1.1  # Rational necessity
        kant: 1.0
        hume: 0.9
    research:
      axis_weights:
        spinoza: 1.2  # Adequate ideas, rational necessity
        kant: 1.1     # Universalizability of methods
        hume: 0.9
        locke: 0.9

  # Verdict thresholds
  verdict_thresholds:
    prohibited: -0.6
    questionable: -0.3
    neutral: 0.0
    permissible: 0.4
    recommended: 0.7

  # Stability classification
  stability:
    critical: [0.0, 0.25]
    unstable: [0.25, 0.45]
    turbulent: [0.45, 0.65]
    stable: [0.65, 0.85]
    harmonized: [0.85, 1.0]
